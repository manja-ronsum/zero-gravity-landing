<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mobile Carousel App</title>
  <link rel="stylesheet" href="style.css?v=2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

  <div class="carousel-container">
    <section class="slide slide-1">
      <div class="content">
        <p class="event-badge-text">SPECIAL EVENT</p>
        <h1 class="event-title">
          <span class="main-title">POFF MEETING</span>
          <span class="sub-title">by ろんさむ</span>
        </h1>
        <div class="event-details-text">
          <p>2026.08.15 SAT PM 6:00〜</p>
          <p>In KARAOKE Bar Rude</p>
          <p>TOKYO, HIGASHINAKANO</p>
        </div>
        <p class="swipe-text">Swipe up for details</p>
        <div class="swipe-indicator">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>
    </section>

    <section class="slide slide-2">
      <div class="content">
        <h2>Place</h2>
        <p>東中野の会場でお待ちしております</p>
      </div>
    </section>

    <section class="slide slide-3">
      <div class="content">
        <h2>Access</h2>
        <div class="map-wrapper">
          <iframe src="https://www.google.com/maps?q=東京都中野区東中野4丁目1-1+英ビル&output=embed" style="border:0;"
            allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">
          </iframe>
        </div>
        <div class="access-info">
          <p class="route">🚶 JR中央線・総武線「東中野駅」<br>東口北側でて目の前</p>
        </div>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>

</html>
