<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mobile Carousel App</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

  <div class="carousel-container">
    <section class="slide slide-1">
      <div class="content">
        <div class="event-badge">SPECIAL EVENT</div>
        <h1 class="event-title">ろんさむPOFF</h1>
        <div class="event-details">
          <div class="detail-item">
            <span class="icon">🗓️</span>
            <span class="text">2026.08.15 SAT</span>
          </div>
          <div class="detail-item">
            <span class="icon">📍</span>
            <span class="text">東京, 東中野</span>
          </div>
        </div>
        <p class="swipe-text">Swipe up for details 👇</p>
        <div class="swipe-indicator">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>
    </section>

    <section class="slide slide-2">
      <div class="content">
        <h2>Place</h2>
        <div class="image-wrapper">
          <img src="images/rude.webp" alt="Place" class="place-image">
        </div>
        <p>東中野の会場でお待ちしております</p>
      </div>
    </section>

    <section class="slide slide-3">
      <div class="content">
        <h2>Start Now</h2>
        <button class="cta-button">Get Started</button>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>

</html>
